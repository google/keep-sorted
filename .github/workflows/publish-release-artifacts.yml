name: Publish Release Artifacts

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux_amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux_arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: darwin_amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin_arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows_amd64
            extension: .exe

    runs-on: ${{matrix.os}}

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.23"

      - name: Build
        run: go build -v -o keep-sorted${{matrix.extension}} .
        env:
          GOOS: ${{matrix.goos}}
          GOARCH: ${{matrix.goarch}}
          CGO_ENABLED: "0"

      - name: Test
        run: go test -v ./...

      - name: Upload Artifacts to Release
        run: |
          echo Uploading ${{matrix.suffix}} artifact for ${GITHUB_REF_NAME}
          mv keep-sorted${{matrix.extension}} keep-sorted_${{matrix.suffix}}${{matrix.extension}}
          gh release upload ${GITHUB_REF_NAME} keep-sorted_${{matrix.suffix}}${{matrix.extension}} --clobber
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
